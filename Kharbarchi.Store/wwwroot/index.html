<body>

    <div id="app">
        <div style="position:absolute; top:30vh; width:100%; text-align:center">
            <div class="coin-container">
                <div class="coin">
                    <div class="front">
                        <img src="./Logo/LOGO.svg" alt="Kharbarchi">
                    </div>
                    <div class="back">
                        <!-- Optional: Different image for back side -->
                        <img src="./Logo/LOGO.svg" alt="Kharbarchi" style="filter: hue-rotate(180deg);">
                    </div>
                </div>
            </div>
            <div style="display:flex; gap:10px; justify-content:center; align-items:center">
               <!-- <div class="spinner-border" role="status"></div>-->
                <p style="font-size:1.5rem;font-family:'Dana'";>در حال بارگذاری...</p>
            </div>
        </div>
    </div>

    <style>
        .coin-container {
            perspective: 1000px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .coin {
            width: 150px;
            height: 150px;
            position: relative;
            /*transform-style: preserve-3d;*/
            animation: coin-flip 5s linear infinite;
        }

            .coin .front, .coin .back {
                position: absolute;
                width: 100%;
                height: 100%;
                backface-visibility: hidden;
                border-radius: 50%; /* Makes it circular like a coin */
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                /*background: linear-gradient(135deg, #ffffff 0%, #ffffff 100%);*/
                box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            }

                .coin .front img, .coin .back img {
                    max-width: 80%;
                    max-height: 80%;
                    object-fit: contain;
                }

            .coin .back {
                transform: rotateY(180deg);
            }

        @keyframes coin-flip {
            0% {
                transform: rotateY(0deg);
            }

            50% {
                transform: rotateY(180deg);
            }

            100% {
                transform: rotateY(360deg);
            }
        }
    </style>

    <script>
        Blazor.start().then(function () {
            // تاخیر کوتاه برای اطمینان از رندر شدن DOM
            setTimeout(function () {
                if (window.headerSticky) {
                    window.headerSticky.init();
                }
            }, 100);
        });
    </script>
