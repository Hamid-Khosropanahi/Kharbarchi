<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>پنل مدیریت خواربارچی</title>
    <base href="/" />
    <link rel="icon" type="image/svg+xml" href="Logo/LOGO.svg" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/kharbarchi-lux-admin.css" />
    <link href="Kharbarchi.Client.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <main class="khb-boot-screen" aria-label="در حال آماده‌سازی پنل مدیریت خواربارچی">
            <div class="khb-boot-aurora khb-boot-aurora-a"></div>
            <div class="khb-boot-aurora khb-boot-aurora-b"></div>
            <section class="khb-boot-card">
                <div class="khb-logo-orbit" aria-hidden="true">
                    <div class="khb-logo-halo"></div>
                    <img class="khb-boot-logo" src="Logo/LOGO.svg" alt="لوگوی خواربارچی" />
                </div>
                <h1>در حال آماده‌سازی پنل مدیریت خواربارچی</h1>
                <p>لطفاً چند لحظه صبر کنید؛ سامانه در حال بارگذاری امن و کامل است.</p>
                <div class="khb-boot-progress"><span></span></div>
            </section>
        </main>
    </div>

    <div id="blazor-error-ui" class="khb-blazor-error">
        <strong>خطایی غیرمنتظره رخ داد.</strong>
        <span>لطفاً صفحه را دوباره بارگذاری کنید یا کنسول مرورگر را بررسی کنید.</span>
        <a href="" class="reload">بارگذاری مجدد</a>
        <a class="dismiss">×</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/kharbarchi-lux-admin.js"></script>
</body>
</html>
