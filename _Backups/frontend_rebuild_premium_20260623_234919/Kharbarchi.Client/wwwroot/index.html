<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2FAE68" />
    <title>پنل مدیریت خواربارچی</title>
    <base href="/" />
    <link rel="icon" type="image/svg+xml" href="Logo/LOGO.svg" />
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="css/kharbarchi-admin-pro.css" rel="stylesheet" />
    <link href="Kharbarchi.Client.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <main class="khb-boot-shell" aria-label="در حال راه‌اندازی پنل مدیریت خواربارچی">
            <section class="khb-boot-card">
                <div class="khb-boot-orbit" aria-hidden="true">
                    <span></span><span></span><span></span>
                </div>
                <div class="khb-boot-logo-wrap">
                    <img src="Logo/LOGO.svg" class="khb-boot-logo" alt="لوگوی خواربارچی" />
                </div>
                <h1>خواربارچی</h1>
                <p>در حال آماده‌سازی پنل مدیریت...</p>
                <div class="khb-boot-progress" aria-hidden="true"><i></i></div>
            </section>
        </main>
    </div>

    <div id="blazor-error-ui" dir="rtl">
        <div class="khb-blazor-error-card">
            <strong>خطایی غیرمنتظره رخ داد.</strong>
            <span>لطفاً صفحه را دوباره بارگیری کنید. اگر خطا تکرار شد، خروجی Console را بررسی کنید.</span>
            <a href="" class="reload">بارگیری مجدد</a>
            <a class="dismiss">×</a>
        </div>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/kharbarchi-ui-pro.js"></script>
</body>
</html>
